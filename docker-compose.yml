services:
  fh6-dashboard:
    image: acaranta/fh6-telemetry-dashboard:latest
    container_name: fh6-dashboard
    restart: unless-stopped
    ports:
      - '8131:8131/tcp'
      - '20440:20440/udp'
    environment:
      WEB_PORT: 8131
      UDP_HOST: 0.0.0.0
      UDP_PORT: 20440
      DATA_DIR: /data
      SESSION_TIMEOUT_SECONDS: 30
      COMPRESS_FINISHED_SESSIONS: 'true'
      ALLOW_DELETE_SESSIONS: 'true'
      LOCK_TO_FIRST_SENDER: 'false'
      LOG_LEVEL: info
      BROADCAST_HZ: 30
      MAP_ENABLED: 'true'
      MAP_AUTODOWNLOAD_TILES: 'false'
    volumes:
      - ./fh6-data:/data
