<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="FH6 Telemetry Dashboard banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#13171f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b1a"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" rx="14" fill="url(#bg)"/>

  <!-- Stylised tachometer on the right -->
  <g transform="translate(1010 110)">
    <circle cx="0" cy="0" r="86" fill="none" stroke="#1c2330" stroke-width="14"/>
    <path d="M -60.81 60.81 A 86 86 0 1 1 60.81 60.81"
          fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round"/>
    <g stroke="#3a4453" stroke-width="2">
      <line x1="0" y1="-94" x2="0" y2="-78"/>
      <line x1="66.5" y1="66.5" x2="55.2" y2="55.2"/>
      <line x1="-66.5" y1="66.5" x2="-55.2" y2="55.2"/>
      <line x1="94" y1="0" x2="78" y2="0"/>
      <line x1="-94" y1="0" x2="-78" y2="0"/>
    </g>
    <line x1="0" y1="0" x2="58" y2="-58" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#e5e7eb"/>
  </g>

  <!-- Diagonal speed accent -->
  <g fill="none" stroke="#ff6b1a" stroke-linecap="round" opacity="0.35">
    <line x1="60" y1="34" x2="180" y2="34" stroke-width="3"/>
    <line x1="60" y1="44" x2="140" y2="44" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="60" y="118"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="84" font-weight="900" letter-spacing="-2" fill="#f3f4f6">FH6 <tspan fill="#ff6b1a">TELEMETRY</tspan></text>
  <text x="62" y="160"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="22" font-weight="600" letter-spacing="6" fill="#8b97a8">DASHBOARD &#183; LIVE &#183; REPLAY &#183; TRACK MAP</text>

  <!-- Tagline -->
  <text x="62" y="195"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="14" font-weight="500" fill="#475569">An unofficial, self-hosted dashboard for Forza Horizon 6 "Data Out" telemetry.</text>
</svg>
